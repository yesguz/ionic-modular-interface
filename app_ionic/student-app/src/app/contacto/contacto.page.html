<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>
      Contacto
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="contact-form">
    <h2 class="ion-text-center">Envíame un mensaje</h2>
    <p class="ion-text-center ion-color-medium">Utiliza este formulario para ponerte en contacto conmigo.</p>

    <ion-list>
      <!-- Formulario vinculado al modelo en TypeScript usando [(ngModel)] -->
      <ion-item>
        <ion-label position="floating">Nombre Completo</ion-label>
        <ion-input type="text" [(ngModel)]="contacto.nombre" placeholder="Ej. Ana Gómez"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Correo Electrónico</ion-label>
        <ion-input type="email" [(ngModel)]="contacto.email" placeholder="ejemplo@correo.com"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Tu Mensaje</ion-label>
        <ion-textarea [(ngModel)]="contacto.mensaje" placeholder="Escribe aquí..." rows="4"></ion-textarea>
      </ion-item>
    </ion-list>

    <!-- Botón que ejecuta el método enviarMensaje() al hacer click -->
    <ion-button expand="block" class="ion-margin-top" color="success" (click)="enviarMensaje()">
      <ion-icon name="send-outline" slot="end"></ion-icon>
      Enviar Mensaje
    </ion-button>
  </div>
</ion-content>
